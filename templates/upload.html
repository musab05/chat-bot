<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Content</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'academiq-orange': '#FF6B35',
                        'academiq-dark': '#1A1A1A',
                        'academiq-gray': '#6B7280'
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-50 min-h-screen">
    <nav class="bg-academiq-dark shadow-lg">
        <div class="container mx-auto px-6 py-4">
            <div class="flex justify-between items-center">
                <div class="flex items-center space-x-3">
                    <div class="w-10 h-10 bg-academiq-orange rounded-lg flex items-center justify-center">
                        <i class="fas fa-graduation-cap text-white text-xl"></i>
                    </div>
                    <h1 class="text-2xl font-bold text-white">Learning Platform</h1>
                </div>
                <div class="flex space-x-6">
                    <a href="/" class="flex items-center space-x-2 text-academiq-orange font-medium">
                        <i class="fas fa-upload"></i>
                        <span>Upload</span>
                    </a>
                    <a href="/chat" class="flex items-center space-x-2 text-gray-300 hover:text-white transition">
                        <i class="fas fa-comments"></i>
                        <span>Smart Chat</span>
                    </a>
                    <a href="/quiz" class="flex items-center space-x-2 text-gray-300 hover:text-white transition">
                        <i class="fas fa-brain"></i>
                        <span>Quiz</span>
                    </a>
                    <a href="/analytics" class="flex items-center space-x-2 text-gray-300 hover:text-white transition">
                        <i class="fas fa-chart-line"></i>
                        <span>Analytics</span>
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <div class="container mx-auto px-6 py-8 max-w-5xl">
        <div class="bg-white rounded-xl shadow-xl border border-gray-200">
            <div class="bg-gradient-to-r from-academiq-orange to-orange-500 text-white p-6 rounded-t-xl">
                <h2 class="text-3xl font-bold flex items-center">
                    <i class="fas fa-cloud-upload-alt mr-3"></i>
                    Content Processing
                </h2>
                <p class="mt-2 text-orange-100">AI-powered content analysis with sentiment, topics, and difficulty assessment</p>
            </div>
            <div class="p-8">
                <!-- File Upload Section -->
                <div class="mb-8">
                    <div class="flex items-center mb-4">
                        <i class="fas fa-file-upload text-academiq-orange text-xl mr-3"></i>
                        <h3 class="text-xl font-semibold text-academiq-dark">Upload File</h3>
                    </div>
                    <div class="border-2 border-dashed border-academiq-orange/30 rounded-xl p-8 text-center bg-orange-50/30 hover:bg-orange-50/50 transition">
                        <input type="file" id="fileInput" accept=".txt,.pdf,.docx,.mp4,.avi,.mov,.wav,.mp3" 
                               class="hidden" onchange="handleFileSelect(event)">
                        <label for="fileInput" class="cursor-pointer">
                            <div class="text-academiq-gray">
                                <i class="fas fa-cloud-upload-alt text-6xl text-academiq-orange mb-4"></i>
                                <p class="text-lg font-medium text-academiq-dark mb-2">Click to upload or drag and drop</p>
                                <p class="text-sm">Supports: Documents (TXT, PDF, DOCX) • Videos (MP4, AVI, MOV) • Audio (WAV, MP3)</p>
                            </div>
                        </label>
                    </div>
                    <div id="fileInfo" class="mt-4 hidden">
                        <div class="bg-green-50 border border-green-200 rounded-lg p-3 flex items-center">
                            <i class="fas fa-check-circle text-green-500 mr-2"></i>
                            <span class="text-sm text-green-700">Selected: <span id="fileName" class="font-medium"></span></span>
                        </div>
                    </div>
                </div>

                <!-- YouTube URL Section -->
                <div class="mb-8">
                    <div class="flex items-center mb-4">
                        <i class="fab fa-youtube text-red-500 text-xl mr-3"></i>
                        <h3 class="text-xl font-semibold text-academiq-dark">YouTube Video</h3>
                    </div>
                    <div class="bg-gray-50 rounded-xl p-6 border border-gray-200">
                        <div class="flex space-x-4">
                            <div class="flex-1 relative">
                                <i class="fas fa-link absolute left-3 top-1/2 transform -translate-y-1/2 text-academiq-gray"></i>
                                <input type="url" id="youtubeUrl" placeholder="https://youtube.com/watch?v=..." 
                                       class="w-full pl-10 pr-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-academiq-orange focus:border-academiq-orange">
                            </div>
                            <button onclick="processYouTube()" 
                                    class="px-6 py-3 bg-red-600 text-white rounded-lg hover:bg-red-700 transition duration-200 flex items-center space-x-2">
                                <i class="fab fa-youtube"></i>
                                <span>Process Video</span>
                            </button>
                        </div>
                    </div>
                </div>

                <!-- Upload Button -->
                <div class="text-center">
                    <button onclick="uploadFile()" id="uploadBtn" disabled
                            class="px-8 py-4 bg-academiq-orange text-white rounded-xl hover:bg-orange-600 disabled:bg-gray-400 disabled:cursor-not-allowed transition duration-200 font-semibold flex items-center space-x-3 mx-auto">
                        <i class="fas fa-magic"></i>
                        <span>Process with AI Analysis</span>
                    </button>
                </div>
            </div>
        </div>
        
        <!-- Progress and Results -->
        <div id="progress" class="mt-6 hidden">
            <div class="bg-blue-50 border border-blue-200 text-blue-800 px-6 py-4 rounded-xl">
                <div class="flex items-center mb-3">
                    <i class="fas fa-spinner fa-spin mr-3 text-blue-600"></i>
                    <p id="progressText" class="font-medium">Processing...</p>
                </div>
                <div class="w-full bg-blue-200 rounded-full h-2">
                    <div id="progressBar" class="bg-blue-600 h-2 rounded-full transition-all duration-300" style="width: 0%"></div>
                </div>
                <p id="progressDetails" class="text-sm text-blue-600 mt-2">Initializing...</p>
            </div>
        </div>

        <div id="result" class="mt-6 hidden">
            <div id="resultContent" class="rounded-xl"></div>
        </div>

        <!-- Content Insights -->
        <div id="insights" class="mt-6 hidden">
            <div class="bg-white rounded-xl shadow-xl border border-gray-200 p-6">
                <h3 class="text-xl font-bold text-academiq-dark mb-4 flex items-center">
                    <i class="fas fa-lightbulb text-academiq-orange mr-3"></i>
                    AI Content Analysis
                </h3>
                <div id="insightsContent" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                    <!-- Insights will be populated here -->
                </div>
            </div>
        </div>
    </div>

    <script>
        let selectedFile = null;

        function handleFileSelect(event) {
            selectedFile = event.target.files[0];
            if (selectedFile) {
                document.getElementById('fileName').textContent = selectedFile.name;
                document.getElementById('fileInfo').classList.remove('hidden');
                document.getElementById('uploadBtn').disabled = false;
            }
        }

        function uploadFile() {
            if (!selectedFile) return;

            const formData = new FormData();
            formData.append('file', selectedFile);

            const isVideo = selectedFile.type.startsWith('video/') || 
                           ['.mp4', '.avi', '.mov'].some(ext => selectedFile.name.toLowerCase().endsWith(ext));
            
            if (isVideo) {
                showProgress('Processing video...', 'Extracting audio and generating transcript...');
                simulateVideoProgress();
            } else {
                showProgress('Processing file...', 'Analyzing content with AI...');
                simulateFileProgress();
            }

            fetch('/upload', {
                method: 'POST',
                body: formData
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    if (data.processing) {
                        showProgress('Video processing in background...', 'This may take a few minutes...');
                        pollProcessingStatus(data.lesson_key, data.title);
                    } else {
                        hideProgress();
                        showSuccessResult(data);
                        loadContentInsights(data.lesson_key);
                    }
                } else {
                    hideProgress();
                    showErrorResult(data.error);
                }
            })
            .catch(error => {
                hideProgress();
                showErrorResult('Upload failed: ' + error.message);
            });
        }

        function processYouTube() {
            const url = document.getElementById('youtubeUrl').value.trim();
            if (!url) return;

            const formData = new FormData();
            formData.append('youtube_url', url);

            showProgress('Processing YouTube video...', 'Downloading and transcribing video...');
            simulateYouTubeProgress();

            fetch('/upload', {
                method: 'POST',
                body: formData
            })
            .then(response => response.json())
            .then(data => {
                hideProgress();
                if (data.success) {
                    showSuccessResult(data);
                    loadContentInsights(data.lesson_key);
                } else {
                    showErrorResult(data.error);
                }
            })
            .catch(error => {
                hideProgress();
                showErrorResult('Processing failed: ' + error.message);
            });
        }

        function pollProcessingStatus(lessonKey, title) {
            const pollInterval = setInterval(() => {
                fetch(`/api/status/${lessonKey}`)
                .then(response => response.json())
                .then(status => {
                    if (status.status === 'completed') {
                        clearInterval(pollInterval);
                        hideProgress();
                        showSuccessResult({
                            lesson_key: lessonKey,
                            title: title,
                            message: 'Video processed successfully!'
                        });
                        loadContentInsights(lessonKey);
                    } else if (status.status === 'failed') {
                        clearInterval(pollInterval);
                        hideProgress();
                        showErrorResult(status.message);
                    } else if (status.status === 'processing') {
                        updateProgress(status.progress, status.message);
                    }
                })
                .catch(error => {
                    clearInterval(pollInterval);
                    hideProgress();
                    showErrorResult('Status check failed: ' + error.message);
                });
            }, 2000);
        }

        function loadContentInsights(lessonKey) {
            fetch(`/api/lesson/insights/${lessonKey}`)
            .then(response => response.json())
            .then(insights => {
                displayInsights(insights);
            })
            .catch(error => {
                console.error('Failed to load insights:', error);
            });
        }

        function displayInsights(insights) {
            const insightsContainer = document.getElementById('insightsContent');
            let html = '';

            // Sentiment Analysis
            if (insights.sentiment) {
                const sentiment = insights.sentiment;
                const emotionColor = sentiment.emotion === 'positive' ? 'text-green-600' : 
                                   sentiment.emotion === 'negative' ? 'text-red-600' : 'text-gray-600';
                html += `
                    <div class="bg-gray-50 rounded-lg p-4">
                        <h4 class="font-semibold text-academiq-dark mb-2 flex items-center">
                            <i class="fas fa-heart mr-2 text-academiq-orange"></i>
                            Sentiment
                        </h4>
                        <p class="${emotionColor} font-medium">${sentiment.emotion.toUpperCase()}</p>
                        <p class="text-sm text-gray-600">Polarity: ${sentiment.polarity.toFixed(2)}</p>
                    </div>
                `;
            }

            // Difficulty Assessment
            if (insights.difficulty) {
                const difficulty = insights.difficulty;
                const difficultyColor = difficulty.difficulty_level === 'easy' ? 'text-green-600' : 
                                      difficulty.difficulty_level === 'hard' ? 'text-red-600' : 'text-yellow-600';
                html += `
                    <div class="bg-gray-50 rounded-lg p-4">
                        <h4 class="font-semibold text-academiq-dark mb-2 flex items-center">
                            <i class="fas fa-chart-line mr-2 text-academiq-orange"></i>
                            Difficulty
                        </h4>
                        <p class="${difficultyColor} font-medium">${difficulty.difficulty_level.toUpperCase()}</p>
                        <p class="text-sm text-gray-600">Grade Level: ${difficulty.flesch_kincaid_grade.toFixed(1)}</p>
                    </div>
                `;
            }

            // Keywords
            if (insights.keywords && insights.keywords.length > 0) {
                html += `
                    <div class="bg-gray-50 rounded-lg p-4">
                        <h4 class="font-semibold text-academiq-dark mb-2 flex items-center">
                            <i class="fas fa-tags mr-2 text-academiq-orange"></i>
                            Key Topics
                        </h4>
                        <div class="flex flex-wrap gap-1">
                            ${insights.keywords.slice(0, 5).map(kw => 
                                `<span class="bg-academiq-orange text-white px-2 py-1 rounded text-xs">${kw.keyword}</span>`
                            ).join('')}
                        </div>
                    </div>
                `;
            }

            // Entities
            if (insights.entities) {
                const concepts = insights.entities.CONCEPT || [];
                if (concepts.length > 0) {
                    html += `
                        <div class="bg-gray-50 rounded-lg p-4">
                            <h4 class="font-semibold text-academiq-dark mb-2 flex items-center">
                                <i class="fas fa-lightbulb mr-2 text-academiq-orange"></i>
                                Key Concepts
                            </h4>
                            <div class="flex flex-wrap gap-1">
                                ${concepts.slice(0, 4).map(concept => 
                                    `<span class="bg-blue-100 text-blue-800 px-2 py-1 rounded text-xs">${concept}</span>`
                                ).join('')}
                            </div>
                        </div>
                    `;
                }
            }

            insightsContainer.innerHTML = html;
            document.getElementById('insights').classList.remove('hidden');
        }

        function showProgress(text, details = '') {
            document.getElementById('progressText').textContent = text;
            document.getElementById('progressDetails').textContent = details;
            document.getElementById('progressBar').style.width = '0%';
            document.getElementById('progress').classList.remove('hidden');
            document.getElementById('result').classList.add('hidden');
        }

        function updateProgress(percentage, details) {
            document.getElementById('progressBar').style.width = percentage + '%';
            document.getElementById('progressDetails').textContent = details;
        }

        function hideProgress() {
            document.getElementById('progress').classList.add('hidden');
        }

        function showSuccessResult(data) {
            showResult(`
                <div class="bg-green-50 border border-green-200 text-green-800 px-6 py-4 rounded-xl">
                    <div class="flex items-center mb-3">
                        <i class="fas fa-check-circle text-green-500 text-xl mr-3"></i>
                        <h4 class="font-bold text-lg">Success!</h4>
                    </div>
                    <p class="mb-2">Content "${data.title}" processed with AI analysis!</p>
                    <p class="text-sm text-green-600 mb-4">Lesson ID: ${data.lesson_key}</p>
                    <div class="flex space-x-3">
                        <a href="/chat" class="bg-academiq-orange text-white px-4 py-2 rounded-lg hover:bg-orange-600 transition flex items-center space-x-2">
                            <i class="fas fa-comments"></i>
                            <span>Smart Chat</span>
                        </a>
                        <a href="/quiz" class="bg-green-600 text-white px-4 py-2 rounded-lg hover:bg-green-700 transition flex items-center space-x-2">
                            <i class="fas fa-brain"></i>
                            <span>Take Quiz</span>
                        </a>
                        <a href="/analytics" class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700 transition flex items-center space-x-2">
                            <i class="fas fa-chart-line"></i>
                            <span>View Analytics</span>
                        </a>
                    </div>
                </div>
            `);
        }

        function showErrorResult(errorMessage) {
            showResult(`
                <div class="bg-red-50 border border-red-200 text-red-800 px-6 py-4 rounded-xl">
                    <div class="flex items-center mb-2">
                        <i class="fas fa-exclamation-circle text-red-500 text-xl mr-3"></i>
                        <h4 class="font-bold text-lg">Error</h4>
                    </div>
                    <p>${errorMessage}</p>
                </div>
            `);
        }

        function showResult(html) {
            document.getElementById('resultContent').innerHTML = html;
            document.getElementById('result').classList.remove('hidden');
        }

        function simulateFileProgress() {
            const steps = [
                { percent: 20, text: 'Reading file content...' },
                { percent: 40, text: 'Analyzing sentiment and topics...' },
                { percent: 60, text: 'Extracting keywords and entities...' },
                { percent: 80, text: 'Creating embeddings...' },
                { percent: 95, text: 'Finalizing AI analysis...' }
            ];
            
            let currentStep = 0;
            const interval = setInterval(() => {
                if (currentStep < steps.length) {
                    updateProgress(steps[currentStep].percent, steps[currentStep].text);
                    currentStep++;
                } else {
                    clearInterval(interval);
                }
            }, 800);
        }

        function simulateVideoProgress() {
            const steps = [
                { percent: 10, text: 'Extracting audio from video...' },
                { percent: 30, text: 'Transcribing audio to text...' },
                { percent: 50, text: 'Analyzing content with AI...' },
                { percent: 70, text: 'Processing sentiment and topics...' },
                { percent: 90, text: 'Creating embeddings...' },
                { percent: 95, text: 'Finalizing processing...' }
            ];
            
            let currentStep = 0;
            const interval = setInterval(() => {
                if (currentStep < steps.length) {
                    updateProgress(steps[currentStep].percent, steps[currentStep].text);
                    currentStep++;
                } else {
                    clearInterval(interval);
                }
            }, 1500);
        }

        function simulateYouTubeProgress() {
            const steps = [
                { percent: 15, text: 'Downloading video from YouTube...' },
                { percent: 35, text: 'Extracting audio track...' },
                { percent: 55, text: 'Generating transcript...' },
                { percent: 75, text: 'Analyzing content with AI...' },
                { percent: 90, text: 'Processing insights...' },
                { percent: 95, text: 'Creating searchable index...' }
            ];
            
            let currentStep = 0;
            const interval = setInterval(() => {
                if (currentStep < steps.length) {
                    updateProgress(steps[currentStep].percent, steps[currentStep].text);
                    currentStep++;
                } else {
                    clearInterval(interval);
                }
            }, 2000);
        }
    </script>
</body>
</html>
